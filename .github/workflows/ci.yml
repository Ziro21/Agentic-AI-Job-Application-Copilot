name: CI

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all packages
        run: python -m compileall -q api agents agents/greenhouse pipeline db scheduler config logging_config.py agents/greenhouse/alerts.py

      - name: Formatting check (Black & isort)
        run: |
          black --check .
          isort --check-only .

      - name: Lint with Flake8
        run: flake8 .

      - name: Type check with Mypy
        run: mypy api agents pipeline scheduler scripts db

      - name: Unit tests with coverage (no DB)
        run: pytest tests/unit -q --tb=short --cov=. --cov-fail-under=70

  dashboard-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
