version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: copilot_user
      POSTGRES_PASSWORD: copilot_password
      POSTGRES_DB: agentic_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot_user -d agentic_copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://copilot_user:copilot_password@db:5432/agentic_copilot
      - REDIS_URL=redis://redis:6379/0
      - HOST=0.0.0.0
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: ats_celery_worker
    restart: unless-stopped
    command: ["celery", "-A", "agents.core.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    environment:
      - DATABASE_URL=postgresql://copilot_user:copilot_password@db:5432/agentic_copilot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    container_name: ats_celery_beat
    restart: unless-stopped
    command: >
      celery -A agents.core.celery_app beat
      --loglevel=info
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=postgresql://copilot_user:copilot_password@db:5432/agentic_copilot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db-backup:
    image: postgres:15-alpine
    environment:
      PGPASSWORD: copilot_password
    volumes:
      - ./backups:/backups
    command: >
      sh -c 'while true; do 
        echo "[Backup Sidecar] Executing autonomous snapshot of agentic_copilot volume...";
        pg_dump -h db -U copilot_user -d agentic_copilot -F c -f /backups/dump_$$(date +%Y%m%d%H%M%S).dump; 
        echo "[Backup Sidecar] Snapshot saved. Hibernating for 24 hours.";
        sleep 86400; 
      done'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
