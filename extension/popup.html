<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; font-family: sans-serif; padding: 15px; margin: 0; background: #09090b; color: #f4f4f5; }
    h3 { font-size: 16px; font-weight: 600; margin-top: 0; }
    input { width: calc(100% - 16px); padding: 8px; margin-top: 10px; background: #18181b; color: white; border: 1px solid #3f3f46; border-radius: 4px; }
    button { display: block; width: 100%; padding: 8px; margin-top: 10px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #4338ca; }
    #status { font-family: monospace; font-size: 11px; margin-top: 15px; background: #18181b; padding: 6px; border-radius: 4px; word-break: break-all; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h3>Job Copilot</h3>
  
  <div id="login-view">
    <input type="text" id="username" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="trigger-login">Bind Copilot JWT Identity</button>
  </div>

  <div id="autofill-view" class="hidden">
    <button id="trigger-fill">Inject Resume into ATS Form</button>
  </div>

  <div id="status">Status: Awaiting authentication...</div>
  <script src="popup.js"></script>
</body>
</html>
